server:
  port: ${PORT:8080}

spring:
  application:
    name: student-reel-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/student_reel}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: ${GROQ_MODEL:llama-3.3-70b-versatile}
          temperature: 0.4

app:
  python-ai:
    base-url: ${APP_PYTHON_AI_BASE_URL:${PYTHON_AI_URL:http://localhost:8000}}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
  reminders:
    cron: ${REMINDER_CRON:0 0 8 * * *}
    email-enabled: ${REMINDER_EMAIL_ENABLED:false}
